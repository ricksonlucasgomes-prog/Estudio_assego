<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Assego Studio">
  <defs>
    <linearGradient id="metal" gradientUnits="userSpaceOnUse" x1="32" y1="6" x2="32" y2="36">
      <stop offset="0" stop-color="#BFD9F7"/>
      <stop offset="0.2" stop-color="#8FBAF0"/>
      <stop offset="0.6" stop-color="#4E8BD8"/>
      <stop offset="1" stop-color="#255C9E"/>
    </linearGradient>
    <linearGradient id="deep" gradientUnits="userSpaceOnUse" x1="32" y1="30" x2="32" y2="49">
      <stop offset="0" stop-color="#5E93D8"/>
      <stop offset="1" stop-color="#1E4272"/>
    </linearGradient>
    <linearGradient id="bar" gradientUnits="userSpaceOnUse" x1="32" y1="50" x2="32" y2="62">
      <stop offset="0" stop-color="#B6D2F5"/>
      <stop offset="0.5" stop-color="#5E93D8"/>
      <stop offset="1" stop-color="#2C63B4"/>
    </linearGradient>
  </defs>

  <!-- Capsula do microfone -->
  <rect x="24" y="6" width="16" height="30" rx="8" fill="url(#metal)" stroke="#CFE3FF" stroke-opacity="0.35"/>
  <!-- Grade -->
  <g stroke="#0C1D34" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round">
    <line x1="27.5" y1="14" x2="36.5" y2="14"/>
    <line x1="27.5" y1="19" x2="36.5" y2="19"/>
    <line x1="27.5" y1="24" x2="36.5" y2="24"/>
  </g>
  <!-- Suporte (semicirculo) + haste -->
  <path d="M20 30 a12 12 0 0 0 24 0" fill="none" stroke="url(#deep)" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="49" stroke="url(#deep)" stroke-width="3.4" stroke-linecap="round"/>
  <!-- Faixa de audio -->
  <g stroke="url(#bar)" stroke-width="3" stroke-linecap="round">
    <line x1="20" y1="55" x2="20" y2="57"/>
    <line x1="26" y1="52" x2="26" y2="60"/>
    <line x1="32" y1="50" x2="32" y2="62"/>
    <line x1="38" y1="52" x2="38" y2="60"/>
    <line x1="44" y1="55" x2="44" y2="57"/>
  </g>
</svg>
